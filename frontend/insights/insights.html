<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>CampusPath | Insights</title>

    <link
        rel="stylesheet"
        href="insights.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header class="navbar">

        <h1>CampusPath</h1>

        <nav>

            <a href="../Dashboard/dashboard.html">

                Dashboard

            </a>

            <a href="insights.html" class="active">

                Insights

            </a>

            <a href="../mentor/mentors.html">

                Mentors

            </a>

        </nav>

        <!-- Hidden by default -->

        <button
            id="writeInsightBtn"
            class="write-btn">

            + Write Insight

        </button>

    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <h2>

            Career Insights

        </h2>

        <p>

            Learn from real placement and internship experiences shared by mentors.

        </p>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <input

            type="text"

            id="searchBox"

            placeholder="Search by title, mentor or company">

        <select id="companyFilter">

            <option value="">

                All Companies

            </option>

        </select>

        <select id="categoryFilter">

            <option value="">

                All Categories

            </option>

            <option value="Placement">

                Placement

            </option>

            <option value="Internship">

                Internship

            </option>

            <option value="Resume">

                Resume

            </option>

            <option value="Career">

                Career

            </option>

        </select>

    </section>

    <!-- ================= TAGS ================= -->

    <section
        id="tagContainer"
        class="tag-container">

    </section>

    <!-- ================= BLOGS ================= -->

    <section
        id="insightContainer"
        class="insight-container">

        <!-- Cards generated by JS -->

    </section>

    <script src="insights.js"></script>

</body>

</html>
