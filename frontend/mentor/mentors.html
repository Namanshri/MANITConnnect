<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusPath | Mentors</title>

    <link rel="stylesheet" href="mentors.css">

</head>

<body>

    <header class="navbar">

        <h1>CampusPath</h1>

        <nav>

            <a href="../Dashboard/dashboard.html">Dashboard</a>

            <a href="mentors.html" class="active">Mentors</a>

            <a href="../contribute/contribute1.html">Become a Mentor</a>

        </nav>

    </header>

    <section class="hero">

        <h2>Expert Mentors</h2>

        <p>

            Browse mentors who have shared their placement and internship journeys.

        </p>

    </section>

    <section class="filters">

        <input
            type="text"
            id="searchBox"
            placeholder="Search by company or mentor">

        <select id="companyFilter">

            <option value="">All Companies</option>

        </select>

        <select id="experienceFilter">

            <option value="">All Experiences</option>

            <option value="Placement">Placement</option>

            <option value="Internship">Internship</option>

        </select>

    </section>

    <section id="mentorContainer" class="mentor-container">

        <!-- Mentor cards will appear here -->

    </section>

    <script src="mentors.js"></script>

</body>

</html>
