<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MANITConnect | Forgot Password</title>

    <link rel="stylesheet"
          href="forgot-password.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="page">

    <!-- LEFT PANEL -->

    <section class="left-panel">

        <div class="brand">

            <h1>

                MANITConnect

            </h1>

            <p>

                Learn. Share. Grow.

            </p>

        </div>

        <div class="welcome">

            <h2>

                Reset Your Password

            </h2>

            <p>

                Don't worry. It happens.
                We'll help you regain access.

            </p>

        </div>

    </section>

    <!-- RIGHT PANEL -->

    <section class="right-panel">

        <div class="form-container">

            <h1>

                Forgot Password

            </h1>

            <p>

                Follow the steps below.

            </p>

            <!-- STEP INDICATOR -->

            <div class="stepper">

                <div class="step active">

                    1

                </div>

                <div class="line"></div>

                <div class="step">

                    2

                </div>

                <div class="line"></div>

                <div class="step">

                    3

                </div>

            </div>

            <!-- STEP 1 -->

            <div id="step1">

                <div class="input-group">

                    <label>

                        Email Address

                    </label>

                    <div class="input-box">

                        <i class="fa-regular fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your registered email">

                    </div>

                </div>

                <button
                    id="sendOtpBtn"
                    class="login-btn">

                    Send OTP

                </button>

            </div>

            <!-- STEP 2 -->

            <div
                id="step2"
                style="display:none;">

                <div class="input-group">

                    <label>

                        OTP

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-key"></i>

                        <input
                            type="text"
                            id="otp"
                            placeholder="Enter OTP">

                    </div>

                </div>

                <button
                    id="verifyOtpBtn"
                    class="login-btn">

                    Verify OTP

                </button>

            </div>

            <!-- STEP 3 -->

            <div
                id="step3"
                style="display:none;">

                <div class="input-group">

                    <label>

                        New Password

                    </label>

                    <div class="input-box password-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Create a new password">

                    </div>

                </div>

                <button
                    id="resetBtn"
                    class="login-btn">

                    Reset Password

                </button>

            </div>

            <p class="bottom-text">

                Remembered your password?

                <a href="login.html">

                    Login

                </a>

            </p>

        </div>

    </section>

</div>

<script src="forgot-password.js"></script>

</body>

</html>
