<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>MANITConnect | Login</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="page">

    <!-- LEFT PANEL -->

    <section class="left-panel">

        <div class="brand">

            <h1>

                MANITConnect

            </h1>

            <p>

                Learn. Share. Grow.

            </p>

        </div>

        <div class="welcome">

            <h2>

                Welcome Back!

            </h2>

            <p>

                Sign in to continue your journey with the MANITConnect community.

            </p>

        </div>

        <div class="features">

            <div class="feature">

                <i class="fa-solid fa-user-group"></i>

                <span>

                    Learn from Real Experiences

                </span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-book-open"></i>

                <span>

                    Career Insights

                </span>

            </div>

            <div class="feature">

                <i class="fa-solid fa-comments"></i>

                <span>

                    Connect & Grow Together

                </span>

            </div>

        </div>

    </section>

    <!-- RIGHT PANEL -->

    <section class="right-panel">

        <div class="form-container">

            <h1>

                Login

            </h1>

            <p>

                Sign in to your account.

            </p>

            <form id="loginForm">

                <div class="input-group">

                    <label>

                        Email Address

                    </label>

                    <div class="input-box">

                        <i class="fa-regular fa-envelope"></i>

                        <input

                            type="email"

                            id="email"

                            placeholder="Enter your email"

                            required>

                    </div>

                </div>

                <div class="input-group">

                    <label>

                        Password

                    </label>

                    <div class="input-box password-box">

                        <i class="fa-solid fa-lock"></i>

                        <input

                            type="password"

                            id="password"

                            placeholder="Enter your password"

                            required>

                        <button

                            type="button"

                            id="togglePassword">

                            <i class="fa-regular fa-eye"></i>

                        </button>

                    </div>

                </div>

                <div class="options">

                    <label>

                        <input

                            type="checkbox"

                            id="rememberMe">

                        Remember Me

                    </label>

                    <a href="forgot-password.html">

                        Forgot Password?

                    </a>

                </div>

                <button

                    class="login-btn"

                    type="submit">

                    Login

                </button>

            </form>

            <p class="bottom-text">

                Don't have an account?

                <a href="choose-role.html">

                    Register

                </a>

            </p>

        </div>

    </section>

</div>

<script src="login.js"></script>

</body>

</html>
